    <!-- Structured Data — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is included in The Ultimate Wedding Guide?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each edition includes a curated vendor directory covering venues, photographers, florists, caterers, bakers, mobile bar services, and wedding dress boutiques. Also included is a 60-task wedding planning checklist and a budget planning guide with sample packages."
          }
        },
        {
          "@type": "Question",
          "name": "How much does The Ultimate Wedding Guide cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The guide is $29 CAD and includes the full vendor directory, budget guide, and planning checklist."
          }
        },
        {
          "@type": "Question",
          "name": "Which Canadian destinations does The Ultimate Wedding Guide cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Currently available for the Canadian Rockies (Calgary, Canmore & Banff) and the West Coast (Vancouver, Squamish, Whistler & Pemberton). New editions for the Okanagan, Toronto, Montreal and more are coming soon."
          }
        },
        {
          "@type": "Question",
          "name": "Can I gift The Ultimate Wedding Guide to someone?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! The guide makes a perfect engagement gift, bridal shower gift, or gift from a maid of honour, mom, or in-laws. Simply select the Gift option on our website."
          }
        }
      ]
    }
    </script>
